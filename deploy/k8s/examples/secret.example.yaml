apiVersion: v1
kind: Secret
metadata:
  name: ses-bounce-secret
  namespace: ses-bounce
  labels:
    app.kubernetes.io/name: ses-bounce-webhook
type: Opaque
stringData:
  # Prefer Kubernetes workload identity/IRSA for AWS. These are placeholders for local-style fallback only.
  AWS_ACCESS_KEY_ID: "replace-me"
  AWS_SECRET_ACCESS_KEY: "replace-me"
  # IMAP is not required for SNS webhook operation, but remains available for legacy sync jobs.
  SES_BOUNCE_IMAP_USER: "mailbox@example.org"
  SES_BOUNCE_IMAP_PASS: "replace-me"
